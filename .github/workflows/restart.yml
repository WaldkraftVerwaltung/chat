name: Restart Chat

on:
  workflow_dispatch:

jobs:
  restart:
    runs-on: ubuntu-latest
    steps:
      - name: Restart
        uses: appleboy/ssh-action@v1
        with:
          host: 91.107.233.103
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 15m
          script: |
            cd /opt/chat

            docker compose down --remove-orphans 2>/dev/null || true
            docker compose up -d 2>&1

            sleep 30

            echo "=== ALL CHAT CONTAINERS ==="
            docker compose ps -a

            echo "=== BACKEND LOGS ==="
            docker compose logs backend --tail 20

            echo "=== FRONTEND LOGS ==="
            docker compose logs frontend --tail 20

            echo "=== CURL TEST ==="
            curl -s -o /dev/null -w "Backend localhost:3010 -> HTTP %{http_code}\n" http://localhost:3010/api/auth/login 2>&1 || echo "Backend unreachable"
            curl -s -o /dev/null -w "Frontend localhost:3011 -> HTTP %{http_code}\n" http://localhost:3011 2>&1 || echo "Frontend unreachable"
