name: Deploy Chat

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: 37.27.248.253
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          command_timeout: 20m
          envs: GH_PAT
          script: |
            set -e

            if [ ! -d /opt/chat ]; then
              git clone "https://x-access-token:${GH_PAT}@github.com/WaldkraftVerwaltung/chat.git" /opt/chat
            else
              cd /opt/chat
              git remote set-url origin "https://x-access-token:${GH_PAT}@github.com/WaldkraftVerwaltung/chat.git"
              git fetch origin main
              git reset --hard origin/main
              git remote set-url origin "https://github.com/WaldkraftVerwaltung/chat.git"
            fi

            cd /opt/chat
            cp .env.production .env
            export COMPOSE_PROJECT_NAME=chat

            # Stop old containers first
            docker compose down --remove-orphans 2>/dev/null || true
            docker compose build
            docker compose up -d

            echo "Waiting for services..."
            sleep 25

            docker compose exec -T backend node dist/database/seed.js 2>&1 || echo "Seed output above"
            docker compose ps

            echo ""
            echo "=== Deploy complete ==="
            echo "Frontend: http://37.27.248.253:4011"
            echo "Backend:  http://37.27.248.253:4010"
            echo ""
            echo "Login:"
            echo "  Jacob: jacob@waldkraft.bio / Chat2026!"
            echo "  Andre: andre@waldkraft.bio / Chat2026!"
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
