name: Debug Frontend

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Debug
        uses: appleboy/ssh-action@v1
        with:
          host: 91.107.233.103
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "=== ALL docker containers ==="
            docker ps -a
            echo "=== Check /opt/chat ==="
            ls /opt/chat/docker-compose.yml 2>&1
            echo "=== Try compose in /opt/chat ==="
            cd /opt/chat && docker compose ps 2>&1
            echo "=== UFW ==="
            ufw status numbered 2>&1 | head -20
