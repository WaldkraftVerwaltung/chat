name: Fix Ports

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Fix ports
        uses: appleboy/ssh-action@v1
        with:
          host: 91.107.233.103
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 15m
          script: |
            echo "=== Who uses 3010? ==="
            ss -tlnp | grep 3010
            lsof -i :3010 2>/dev/null || true
            echo "=== Who uses 3011? ==="
            ss -tlnp | grep 3011
            lsof -i :3011 2>/dev/null || true
            echo "=== All docker containers on these ports ==="
            docker ps -a --format "table {{.Names}}\t{{.Ports}}\t{{.Status}}" | grep -E "3010|3011" || echo "None"
            echo "=== Restart Docker daemon ==="
            systemctl restart docker
            sleep 10
            echo "=== After docker restart ==="
            ss -tlnp | grep -E "3010|3011" || echo "Ports free now"
            echo "=== Start chat ==="
            cd /opt/chat
            docker compose up -d 2>&1
            sleep 30
            docker compose ps -a
            curl -s -o /dev/null -w "Backend: %{http_code}\n" http://localhost:3010/api/auth/login
            curl -s -o /dev/null -w "Frontend: %{http_code}\n" http://localhost:3011
